<!doctype html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agenda Família Real Firebase</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:Arial,sans-serif;background:#f5f6fb}.card{background:#fff;border-radius:24px;box-shadow:0 8px 30px rgba(15,23,42,.06)}.btn{border-radius:14px;padding:8px 14px;font-size:14px;font-weight:700}.input{width:100%;border:1px solid #dbe3ef;border-radius:16px;padding:11px 14px;font-size:14px;outline:none;background:#fff}.label{display:block;font-size:14px;font-weight:700;color:#334155;margin-bottom:7px}.badge{border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}@media print{aside,header,.no-print,button{display:none!important}main{margin-left:0!important}.card{box-shadow:none!important;border:1px solid #ddd!important}}

/* Ajuste geral de escala/fonte */
html{font-size:14px}
body{font-size:0.92rem}
.card{border-radius:1.35rem!important}
.btn{padding:0.58rem 1rem!important;font-size:0.86rem!important;border-radius:0.85rem!important}
.input{padding:0.72rem 0.9rem!important;font-size:0.92rem!important;border-radius:0.9rem!important}
.label{font-size:0.82rem!important}
aside .p-7{padding:1.35rem!important}
aside .h-12{height:2.5rem!important}
aside .w-12{width:2.5rem!important}
main header{padding-top:0.65rem!important;padding-bottom:0.65rem!important}
.min-h-32{min-height:7rem!important}


/* Responsivo mobile */
.mobile-menu-btn{display:none}
@media (max-width:1023px){
  html{font-size:13px}
  body{overflow-x:hidden}
  .mobile-menu-btn{display:inline-flex}
  .mobile-sidebar{
    position:fixed;
    inset:0 auto 0 0;
    width:82vw;
    max-width:320px;
    transform:translateX(-105%);
    transition:transform .25s ease;
    z-index:50;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
  }
  .mobile-sidebar.open{transform:translateX(0)}
  .mobile-backdrop{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    z-index:45;
  }
  .mobile-backdrop.open{display:block}
  main{margin-left:0!important}
  main header{
    position:sticky;
    top:0;
    padding:.75rem 1rem!important;
  }
  main header h2{font-size:1.2rem!important}
  main header .btn{padding:.55rem .8rem!important}
  section{padding:1rem!important}
  .card{padding:1rem!important;border-radius:1.1rem!important}
  .grid{grid-template-columns:1fr!important}
  .md\:grid-cols-2,.md\:grid-cols-3,.md\:grid-cols-4,.xl\:grid-cols-\[1\.3fr_0\.7fr\],.xl\:grid-cols-\[1\.1fr_0\.9fr\],.xl\:grid-cols-\[0\.8fr_1\.2fr\],.xl\:grid-cols-\[0\.82fr_1\.18fr\]{grid-template-columns:1fr!important}
  .flex{flex-wrap:wrap}
  .input{width:100%!important}
  table{min-width:760px}
  .overflow-x-auto{overflow-x:auto}
  .min-h-32{min-height:6rem!important}
  .rounded-3xl{border-radius:1.1rem!important}
}
@media print{
  .mobile-menu-btn,.mobile-backdrop{display:none!important}
}


/* Produção mobile refinado */
@media (max-width:640px){
  .login-card-prod{padding:1.25rem!important}
  .login-logo-prod{height:5.5rem!important;width:5.5rem!important}
  .login-title-prod{font-size:2rem!important;line-height:1.05!important}
  .btn{min-height:44px}
}

</style>
</head>

function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
function toast(t){let d=document.createElement('div');d.className='fixed bottom-5 right-5 z-50 rounded-2xl bg-[#040036] px-5 py-3 text-sm font-bold text-white shadow-xl';d.innerText=t;document.body.appendChild(d);setTimeout(()=>d.remove(),2500)}
function pastoralType(t){return t==='Aconselhamento Pastoral'||t==='Acompanhamento de Liderança'}

function userRoles(){
  if(!user) return [];
  if(Array.isArray(user.roles)) return user.roles.map(String);
  if(user.role) return String(user.role).split(',').map(x=>x.trim()).filter(Boolean);

}
function hasRole(role){
  return userRoles().includes(role);
}

  const r=userRoles();

async function login(e){
  if(e && e.preventDefault) e.preventDefault();
  if(e && e.stopPropagation) e.stopPropagation();

  const usuarioEl=document.getElementById('loginUser');
  const senhaEl=document.getElementById('loginPass');
  const msg=document.getElementById('loginMsg');

  const usuario=(usuarioEl?.value||'').trim().toLowerCase();
  const senha=(senhaEl?.value||'').trim();

  if(msg) msg.innerText='';

  try{
    if(!usuario || !senha){
      throw new Error('Informe usuário e senha.');
    }

    const snap=await getDocs(collection(db,'usuarios'));
    let profile=null;

    snap.forEach(d=>{
      const u=d.data();
      const username=String(u.username||'').trim().toLowerCase();
      const name=String(u.name||'').trim().toLowerCase();
      const email=String(u.email||'').trim().toLowerCase();

      if(username===usuario || name===usuario || email===usuario || email.startsWith(usuario+'@')){
        profile={id:d.id,...u};
      }
    });

    // Recuperação inicial do Admin, caso o usuário ainda não exista.
    if(!profile && usuario==='admin' && senha==='admin'){
      const adminId='user_admin';
      const adminProfile={
        username:'admin',
        name:'Administrador',
        email:'admin@local.agenda',
        senhaLocal:'admin',
        roles:['Admin'],
        role:'Admin',
        active:true,
        createdAt:serverTimestamp()
      };

      await setDoc(doc(db,'usuarios',adminId),adminProfile,{merge:true});
      profile={id:adminId,...adminProfile};
    }

    if(!profile){
      throw new Error('Usuário não encontrado');
    }

    if(profile.active===false){
      throw new Error('Usuário inativo');
    }

    if(!profile.senhaLocal){
      const roles=Array.isArray(profile.roles)?profile.roles:(profile.role?String(profile.role).split(',').map(x=>x.trim()).filter(Boolean):[]);
      const isAdmin=roles.includes('Admin');
      const isThiago=usuario==='thiago' || String(profile.name||'').toLowerCase()==='thiago' || String(profile.email||'').toLowerCase().startsWith('thiago');

      if(isAdmin && isThiago && senha==='admin'){
        await setDoc(doc(db,'usuarios',String(profile.id)),{
          username:profile.username || 'thiago',
          senhaLocal:'admin',
          senhaRecuperadaEm:serverTimestamp()
        },{merge:true});

        profile.senhaLocal='admin';
        profile.username=profile.username || 'thiago';
      }else{
        throw new Error('Usuário sem senha local definida.');
      }
    }

    if(String(profile.senhaLocal||'') !== senha){
      throw new Error('Senha inválida');
    }

    user={
      uid:profile.id,
      email:profile.email||'',
      username:profile.username||usuario,
      name:profile.name||profile.username||usuario,
      role:profile.role||'',
      roles:Array.isArray(profile.roles)?profile.roles:(profile.role?String(profile.role).split(',').map(x=>x.trim()).filter(Boolean):['Lider'])
    };

    sessionStorage.setItem('afr_local_user', JSON.stringify(user));

    authReady=true;
    ready=true;

    toast('Login realizado');
    render();
  }catch(err){
    console.error('Erro no login:', err);
    if(msg) msg.innerText='Erro no login: '+(err.message||'usuário ou senha inválidos.');
  }

  return false;
}

async function createUserByAdmin(e){
  if(e && e.preventDefault) e.preventDefault();
  if(e && e.stopPropagation) e.stopPropagation();

  if(!user || !hasRole('Admin')){
    alert('Apenas administrador pode incluir usuários.');
    return;
  }

  const msg=document.getElementById('userCreateMsg');
  const btn=document.getElementById('btnCreateUserAdmin');

  const username=document.getElementById('newUsername').value.trim().toLowerCase().replace(/[^a-z0-9._-]/g,'');
  const senha=document.getElementById('newUserPass').value.trim();
  const name=document.getElementById('newUserName').value.trim() || username;
  const email=username+'@local.agenda';

  const selectedRoles=Array.from(document.querySelectorAll('input[name="newUserRoles"]:checked')).map(x=>x.value);
  const roles=selectedRoles.length ? selectedRoles : ['Lider'];
  const role=roles.join(',');

  if(msg){
    msg.className='text-red-600 text-sm font-semibold';
    msg.innerText='';
  }

  if(!username){
    if(msg) msg.innerText='Informe o usuário local.';
    alert('Informe o usuário local.');
    return;
  }

  if(!senha || senha.length < 4){
    if(msg) msg.innerText='A senha precisa ter pelo menos 4 caracteres.';
    alert('A senha precisa ter pelo menos 4 caracteres.');
    return;
  }

  try{
    if(btn){
      btn.disabled=true;
      btn.innerText='Incluindo...';
      btn.classList.add('opacity-60');
    }

    const uid='user_'+username;

    const exists=userProfiles.find(x=>String(x.username||'').toLowerCase()===username || String(x.id)===uid);
    if(exists){
      throw new Error('Este usuário já existe.');
    }

    const perfil={
      username,
      name,
      role,
      roles,
      email,
      senhaLocal:senha,
      active:true,
      createdBy:user.username||user.email||user.name||'',
      createdAt:serverTimestamp()
    };

    await setDoc(doc(db,'usuarios',uid),perfil,{merge:true});

    userProfiles=userProfiles.filter(x=>x.id!==uid).concat([{id:uid,...perfil}])
      .sort((a,b)=>String(a.name||'').localeCompare(String(b.name||'')));

    if(msg){
      msg.className='text-emerald-600 text-sm font-semibold';
      msg.innerText='Usuário incluído com sucesso: '+username;
    }

    document.getElementById('newUsername').value='';
    document.getElementById('newUserPass').value='';
    document.getElementById('newUserName').value='';
    document.querySelectorAll('input[name="newUserRoles"]').forEach((x,i)=>x.checked=(i===0));

    toast('Usuário incluído com sucesso');
    alert('Usuário incluído com sucesso: '+username);

    render();
    setPage('Usuários');

  }catch(err){
    console.error('Erro ao incluir usuário:', err);

    const texto=err.message || String(err);

    if(msg){
      msg.className='text-red-600 text-sm font-semibold';
      msg.innerText='Erro ao incluir usuário: '+texto;
    }

    alert('Erro ao incluir usuário: '+texto);

  }finally{
    if(btn){
      btn.disabled=false;
      btn.innerText='Incluir usuário';
      btn.classList.remove('opacity-60');
    }
  }
}

async function saveUserRoles(uid){
  if(!user || !hasRole('Admin')){ alert('Apenas administrador pode alterar perfis.'); return; }
  const roles=Array.from(document.querySelectorAll('input[name="roles_'+uid+'"]:checked')).map(x=>x.value);
  const finalRoles=roles.length?roles:['Lider'];
  try{
    await setDoc(doc(db,'usuarios',String(uid)),{
      roles:finalRoles,
      role:finalRoles.join(','),
      updatedBy:user.username||user.email||user.name||'',
      updatedAt:serverTimestamp()
    },{merge:true});
    toast('Perfil atualizado');
  }catch(err){ console.error(err); alert('Erro ao salvar perfil: '+err.message); }
}

async function delUserProfile(uid){
  if(!user || !hasRole('Admin')){
    alert('Apenas administrador pode excluir usuários.');
    return;
  }

  if(String(uid)===String(user.uid)){
    alert('Você não pode excluir o próprio usuário logado.');
    return;
  }

  const u=userProfiles.find(x=>String(x.id)===String(uid));
  const nome=(u && (u.name||u.username||u.email)) ? (u.name||u.username||u.email) : 'este usuário';

  if(!confirm('Deseja excluir '+nome+' da lista do sistema?')) return;

  try{
    await deleteDoc(doc(db,'usuarios',String(uid)));
    userProfiles=userProfiles.filter(x=>String(x.id)!==String(uid));
    toast('Usuário excluído');
    alert('Usuário excluído da lista do sistema.');
    render();
  }catch(err){
    console.error('Erro ao excluir usuário:',err);
    alert('Erro ao excluir usuário: '+err.message);
  }
}

async function changeUserPassword(uid){
  if(!user || !hasRole('Admin')){
    alert('Apenas administrador pode alterar senha.');
    return;
  }

  const u=userProfiles.find(x=>String(x.id)===String(uid));
  if(!u){
    alert('Usuário não localizado.');
    return;
  }

  const nome=u.username || u.name || u.email || 'usuário';
  const novaSenha=prompt('Digite a nova senha para '+nome+'\\nMínimo 4 caracteres:');

  if(novaSenha===null) return;

  if(!novaSenha || novaSenha.length < 4){
    alert('A senha precisa ter pelo menos 4 caracteres.');
    return;
  }

  try{
    await setDoc(doc(db,'usuarios',String(uid)),{
      senhaLocal:novaSenha,
      senhaAlteradaEm:serverTimestamp(),
      senhaAlteradaPor:user.username||user.email||user.name||''
    },{merge:true});

    userProfiles=userProfiles.map(x=>String(x.id)===String(uid)?{...x,senhaLocal:novaSenha}:x);

    toast('Senha alterada');
    alert('Senha alterada com sucesso para: '+nome);
  }catch(err){
    console.error('Erro alterar senha:', err);
    alert('Erro ao alterar senha: '+err.message);
  }
}

async function deleteSolicitacao(id){

}

function setCalendarMonth(value){
  calendarMonth=value;
  render();
}
function changeCalendarMonth(offset){
  let parts=calendarMonth.split('-').map(Number);
  let d=new Date(parts[0],parts[1]-1+offset,1);
  calendarMonth=d.toISOString().slice(0,7);
  render();
}
function monthName(ym){
  let p=ym.split('-');
  let names=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return names[Number(p[1])-1]+' de '+p[0];
}

function calendario(){
  let approved=requests.filter(r =>
    r.status==='Aprovado' &&
    (r.date||'').startsWith(calendarMonth) &&
    (user.role!=='Lider'||!pastoralType(r.type))
  );

  let parts=calendarMonth.split('-').map(Number);
  let year=parts[0], month=parts[1];
  let firstDay=new Date(year,month-1,1).getDay();
  let lastDate=new Date(year,month,0).getDate();
  let days=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  let grid=days.map(d=>`<div class="bg-slate-100 p-3 text-center text-xs font-bold">${d}</div>`).join('');

  for(let i=0;i<firstDay;i++){
    grid+=`<div class="min-h-32 border-t bg-white p-3"></div>`;

function normalizarPerfil(txt){
  return String(txt || '')
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}
function getUserRolesLocal(u){
  if(!u) return [];
  if(Array.isArray(u.roles)) return u.roles.map(x=>String(x).trim()).filter(Boolean);
  if(u.role) return String(u.role).split(',').map(x=>x.trim()).filter(Boolean);
  return [];
}
function usuariosPorPerfil(perfil){
  const perfilNormalizado = normalizarPerfil(perfil);
  return userProfiles
    .filter(u => getUserRolesLocal(u).some(r => normalizarPerfil(r) === perfilNormalizado))
    .map(u => u.name || u.username || u.email || '')
    .filter(Boolean)
    .sort((a,b)=>String(a).localeCompare(String(b)));
}

function val(id){return document.getElementById(id)?.value||''}function conflict(ex,cur){return ex.status==='Aprovado'&&ex.date===cur.date&&cur.startTime<ex.endTime&&cur.endTime>ex.startTime}
async function submitRequest(e){
  if(e && e.preventDefault) e.preventDefault();

  const formMsg=document.getElementById('formMsg');

  try{
    let type=val('type'),
        isChild=type==='Apresentação de Criança',
        isEvento=type==='Evento',
        isReuniao=type==='Reunião',
        isCulto=type==='Culto / Programação fixa',
        isAconselhamento=type==='Aconselhamento Pastoral',
        isAcompanhamento=type==='Acompanhamento de Liderança',
        id=editingId||String(Date.now());

    const pastorResponsavel=val('responsiblePastor');
    const responsavelDireto=val('responsible');

    let data={
      id,
      type,
      title:val('title'),
      childName:val('childName'),
      father:val('father'),
      mother:val('mother'),
      birthDate:val('birthDate'),
      memberName:val('memberName'),
      nomeMembro:val('memberName'),
      ministry:val('ministry'),
      responsiblePastor:pastorResponsavel,
      pastor:pastorResponsavel,
      responsible:responsavelDireto,
      responsavelDireto:responsavelDireto,
      date:val('date'),
      startTime:val('startTime'),
      endTime:val('endTime'),
      location:val('location'),
      description:val('description'),
      descricao:val('description'),
      objective:val('objective'),
      objetivo:val('objective'),
      supports:checkedValues('supports'),
      creations:checkedValues('creations'),
      notes:val('notes'),
      observacoes:val('notes'),
      status:'Pendente',
      createdBy:user?.name||user?.username||'',
      createdByUid:user?.uid||'',
      updatedAt:serverTimestamp(),
      createdAt:editingId ? undefined : serverTimestamp()
    };

    Object.keys(data).forEach(k=>{
      if(data[k]===undefined) delete data[k];
    });

    if(isChild) data.title='Apresentação - '+data.childName;
    if(isAconselhamento) data.title='Aconselhamento Pastoral - '+data.memberName;
    if(isAcompanhamento && !data.title) data.title='Acompanhamento de Liderança';
    if(!data.title && data.type) data.title=data.type;

    if((isEvento||isReuniao||isCulto) && !data.title){
      alert('Informe o nome da solicitação.');
      return;
    }

    if(isChild && !data.childName){
      alert('Informe o nome da criança.');
      return;
    }

    if(isAconselhamento && !data.memberName){
      alert('Informe o nome do membro.');
      return;
    }

    if((isEvento||isReuniao||isCulto||isAcompanhamento) && !data.ministry){
      alert('Informe o ministério responsável.');
      return;
    }

    if((isAconselhamento||isAcompanhamento) && !data.responsiblePastor){
      alert('Informe o pastor responsável.');
      return;
    }

    if((isEvento||isReuniao||isCulto) && !data.responsible){
      alert('Informe o responsável direto.');
      return;
    }

    if((isEvento||isCulto) && !data.description){
      alert('Informe a descrição da solicitação.');
      return;
    }

    if(!data.date || !data.startTime || !data.endTime){
      alert('Informe data, início e fim.');
      return;
    }

    if(data.startTime>=data.endTime){
      alert('O horário final precisa ser maior que o início.');
      return;
    }

    let loc=requests.find(r=>String(r.id)!==String(editingId)&&r.location===data.location&&conflict(r,data));
    if(loc){
      alert('Conflito de horário no local: '+title(loc));
      return;
    }

    if(data.responsiblePastor){
      let pc=requests.find(r=>String(r.id)!==String(editingId)&&(r.responsiblePastor||r.pastor)===data.responsiblePastor&&conflict(r,data));
      if(pc){
        alert('Conflito na agenda do pastor.');
        return;
      }
    }

    await setDoc(doc(db,'solicitacoes',String(id)),data,{merge:true});

    requests=requests.filter(r=>String(r.id)!==String(id)).concat([{...data,id:String(id)}]);

    editingId=null;
    page=hasRole('Admin')?'Agendas Pendentes':'Calendário';

    toast('Solicitação enviada para aprovação');
    alert('Solicitação enviada para aprovação com sucesso.');

    render();

  }catch(err){
    console.error('Erro ao enviar solicitação:', err);
    if(formMsg) formMsg.innerHTML='<div class="rounded-2xl bg-red-50 p-4 text-red-700">Erro ao salvar: '+err.message+'</div>';
    alert('Erro ao salvar solicitação: '+err.message);
  }
}

async function addMinisterioLocal(e){
  if(e && e.preventDefault) e.preventDefault();

  const input=document.getElementById('ministerioNome');
  const nome=(input?.value||'').trim();

  if(!nome){
    alert('Informe o nome do ministério.');
    return;
  }

  try{
    await addDoc(collection(db,'ministerios'),{
      name:nome,
      nome:nome,
      createdAt:serverTimestamp(),
      createdBy:user?.username||user?.name||''
    });

    // Atualiza a tela imediatamente, sem esperar o snapshot.
    if(!ministerios.includes(nome)){
      ministerios=[...ministerios,nome].sort();
    }

    if(input) input.value='';
    toast('Ministério incluído');
    alert('Ministério incluído com sucesso: '+nome);

    render();
    setPage('Ministérios');

  }catch(err){
    console.error('Erro ao incluir ministério:', err);
    alert('Erro ao incluir ministério: '+err.message);
  }
}

document.addEventListener('click', async function(ev){
  const btn = ev.target.closest('[data-action]');
  if(!btn) return;

  const action = btn.getAttribute('data-action');
  const id = btn.getAttribute('data-id');

  try{
    if(action === 'change-user-password'){
      ev.preventDefault();
      await window.changeUserPassword(id);
    }

    if(action === 'delete-user-profile'){
      ev.preventDefault();
      await window.delUserProfile(id);
    }

    if(action === 'save-user-roles'){
      ev.preventDefault();
      await window.saveUserRoles(id);
    }

    if(action === 'delete-solicitacao'){
      ev.preventDefault();
      await window.deleteSolicitacao(id);
    }
  }catch(err){
    console.error('Erro no botão:', action, id, err);
    alert('Erro ao executar ação: '+err.message);
  }
});
